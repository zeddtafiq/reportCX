<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
LRT Intertripping Inspection
</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>

<div class="container">

<h2>
Intertripping Test Form
</h2>

<form id="inspectionForm">

<!-- Inspector Name -->

<label for="petugas">
Inspector Name
</label>

<input
type="text"
id="petugas"
placeholder="Input Inspector Name"
required>



<!-- Equipment Name -->

<label for="equipment">
Equipment Name
</label>

<input
type="text"
id="equipment"
placeholder="Input Equipment Name"
required>


<!-- Station -->

<label for="station">
Station
</label>

<select
id="station"
required>

<option value="">
-- Select Station --
</option>

<option>
Velodrome Station
</option>

<option>
Equestrian Station
</option>

<option>
Pulomas Station
</option>

<option>
Boulevard Selatan Station
</option>

<option>
Boulevard Utara Station
</option>

<option>
Pengangsaan Dua Station
</option>

</select>


<!-- Panel Name -->

<label for="panelName">
Panel Name
</label>

<select
id="panelName"
required>

<option value="">
-- Select Panel --
</option>

<option>
HSCB out #1
</option>

<option>
HSCB out #2
</option>
<option>
HSCB out #3
</option>
<option>
HSCB out #4
</option>

</select>


<!-- Intertripping Type -->

<label for="intertripType">
Intertripping Type
</label>

<select
id="intertripType"
required>

<option value="">
-- Select Type --
</option>

<option>
Applied
</option>

<option>
Not Applied
</option>

</select>


<!-- Location -->



<!-- Status -->

<label for="statusCondition">
Status
</label>

<select
id="statusCondition"
required>

<option value="">
-- Select Status --
</option>

<option>
OK
</option>

<option>
Not OK
</option>

</select>

<!-- Description -->

<label for="keterangan">
Finding</label>

<textarea
id="keterangan"
placeholder="Input Finding">
</textarea>


<!-- Photo -->

<label for="photo">
Photo Evidence
</label>

<input
type="file"
id="photo"
accept="image/*"
capture="environment"
required>

<img
id="preview"
style="display:none;width:100%;margin-top:10px;">


<button type="submit">

Submit Inspection

</button>

</form>

<div id="status"></div>

</div>

<script src="script.js"></script>

</body>

</html>
