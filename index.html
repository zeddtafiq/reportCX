<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Electrical Inspection
</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>

<div class="container">

<h2>
Electrical Inspection Form
</h2>

<form id="inspectionForm">

<input
type="text"
id="petugas"
placeholder="Nama Petugas"
required>

<input
type="text"
id="lokasi"
placeholder="GPS Location"
readonly>

<input
type="text"
id="equipment"
placeholder="Equipment Name"
required>

<select id="kategori">

<option>Velodrome Station</option>

<option>Equestrian Station</option>

<option>Pulomas Station</option>

<option>Boulevard Selatan Station</option>

<option>Boulevard Utara Station</option>

<option>Pengangsang Dua Station</option>

</select>


<select id="kategori">

<option>BLS</option>

<option>DC Switchgear</option>

</select>


<select id="kategori">

<option>Applied</option>
<option>Not Applied</option>

</select>

<select id="kategori">

<option>Ok</option>
<option>Not Oke</option>

</select>





<input
type="number"
id="nilai"
placeholder="Inspection Score"
required>

<textarea
id="keterangan"
placeholder="Description">
</textarea>

<input
type="file"
id="photo"
accept="image/*"
capture="environment"
required>

<img id="preview">

<button type="submit">
Submit
</button>

</form>

<div id="status"></div>

</div>

<script src="script.js"></script>

</body>

</html>
