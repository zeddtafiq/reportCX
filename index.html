<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Intertripping Test Form
</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<div class="card">

<h1>
Intertripping Test Form
</h1>

<form id="inspectionForm">

<div class="form-group">

<label>
Inspector Name
</label>

<input
type="text"
id="petugas"
placeholder="Enter Inspector Name"
required>

</div>


<div class="form-group">

<label>
Station
</label>

<select id="station" required>

<option value="">
-- Select Station --
</option>

<option>Velodrome Station</option>
<option>Equestrian Station</option>
<option>Pulomas Station</option>
<option>Boulevard Selatan Station</option>
<option>Boulevard Utara Station</option>
<option>Pengangsaan Dua Station</option>

</select>

</div>


<div class="form-group">

<label>
Equipment Name
</label>

<select id="panelName" required>

<option value="">
-- Select Equipment --
</option>

<option>HSCB Out #1</option>
<option>HSCB Out #2</option>
<option>HSCB Out #3</option>
<option>HSCB Out #4</option>
<option>HSCB Out #5</option>
<option>HSCB Out #6</option>
<option>HSCB Out #7</option>
<option>HSCB Out #8</option>

</select>

</div>


<div class="form-group">

<label>
Intertripping Type
</label>

<select id="intertripType" required>

<option value="">
-- Select Type --
</option>

<option>BLS</option>
<option>DC Switchgear</option>

</select>

</div>


<div class="form-group">

<label>
Bypass
</label>

<select id="bypass" required>

<option value="">
-- Select Bypass Status --
</option>

<option>Applied</option>
<option>Not Applied</option>

</select>

</div>


<div class="form-group">

<label>
Status
</label>

<select id="statusCondition" required>

<option value="">
-- Select Status --
</option>

<option>OK</option>
<option>Not OK</option>

</select>

</div>


<div class="form-group">

<label>
Finding
</label>

<textarea
id="keterangan"
placeholder="Enter finding or remarks">
</textarea>

</div>


<div class="form-group">

<label>
Photo Evidence
</label>

<input
type="file"
id="photo"
accept="image/*"
required>

</div>


<img
id="preview"
class="preview-image">


<button
type="submit"
id="submitBtn">
Submit Inspection
</button>

</form>


<div id="status"></div>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
